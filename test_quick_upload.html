<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Upload Test - Ashreka Pottery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4>Quick Upload Test</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Confirmation Code</label>
                            <input type="text" class="form-control" id="confirm_code" 
                                   placeholder="Enter 6-digit code" maxlength="6">
                            <small class="text-muted">Test codes: 123456, 654321, 111111</small>
                        </div>
                        
                        <button type="button" class="btn btn-primary" id="nextBtn" disabled>
                            Next Step <i class="fas fa-arrow-right ms-1"></i>
                        </button>
                        
                        <!-- Order Details -->
                        <div id="order_details" class="mt-3" style="display: none;">
                            <div class="card border-success">
                                <div class="card-header bg-success text-white">
                                    <i class="fas fa-shopping-cart me-2"></i>Order Details
                                </div>
                                <div class="card-body" id="order_content">
                                    <!-- Order details will be loaded here -->
                                </div>
                            </div>
                        </div>
                        
                        <!-- Debug Info -->
                        <div id="debug_info" class="mt-3">
                            <div class="card border-info">
                                <div class="card-header bg-info text-white">Debug Info</div>
                                <div class="card-body">
                                    <div id="debug_content">Ready for testing...</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function debugLog(message) {
            const debugContent = document.getElementById('debug_content');
            const timestamp = new Date().toLocaleTimeString();
            debugContent.innerHTML += `<div>[${timestamp}] ${message}</div>`;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            debugLog('Page loaded successfully');
            
            const confirmCodeInput = document.getElementById('confirm_code');
            const orderDetails = document.getElementById('order_details');
            const orderContent = document.getElementById('order_content');
            const nextBtn = document.getElementById('nextBtn');
            
            if (confirmCodeInput) {
                debugLog('Confirmation code input found');
                
                confirmCodeInput.addEventListener('input', function() {
                    const code = this.value.trim();
                    debugLog(`Code entered: "${code}" (length: ${code.length})`);
                    
                    if (code.length === 6) {
                        debugLog('6 digits entered, making API call...');
                        
                        fetch('./api/test_order_details.php', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ confirm_code: code })
                        })
                        .then(response => {
                            debugLog(`API response status: ${response.status}`);
                            return response.json();
                        })
                        .then(data => {
                            debugLog(`API response: ${JSON.stringify(data)}`);
                            
                            if (data.success) {
                                orderContent.innerHTML = `
                                    <div class="row">
                                        <div class="col-12">
                                            <h6 class="mb-3">Items:</h6>
                                            ${data.items.map(item => `
                                                <div class="d-flex align-items-center mb-3 p-2 border rounded">
                                                    <img src="../../${item.image}" alt="${item.name}" 
                                                         class="me-3" style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px;"
                                                         onerror="this.src='../../assets/images/default-product.jpg'">
                                                    <div class="flex-grow-1">
                                                        <strong>${item.name}</strong><br>
                                                        <small class="text-muted">Qty: ${item.quantity}</small>
                                                    </div>
                                                    <span class="fw-bold">${item.price} ETB</span>
                                                </div>
                                            `).join('')}
                                            <div class="text-end mt-3 pt-3 border-top">
                                                <h5 class="text-success mb-0">Total: ${data.total} ETB</h5>
                                            </div>
                                        </div>
                                    </div>
                                `;
                                orderDetails.style.display = 'block';
                                nextBtn.disabled = false;
                                debugLog('Order details displayed successfully');
                            } else {
                                orderDetails.style.display = 'none';
                                nextBtn.disabled = true;
                                debugLog('Invalid code - hiding order details');
                            }
                        })
                        .catch(error => {
                            debugLog(`API error: ${error.message}`);
                            orderDetails.style.display = 'none';
                            nextBtn.disabled = true;
                        });
                    } else {
                        orderDetails.style.display = 'none';
                        nextBtn.disabled = true;
                        if (code.length > 0) {
                            debugLog('Waiting for 6 digits...');
                        }
                    }
                });
            } else {
                debugLog('ERROR: Confirmation code input not found!');
            }
        });
    </script>
</body>
</html>
